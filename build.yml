name: Build iOS App with Xcode 16

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13  # Xcode 16 requires macOS 13+
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode 16
      run: |
        sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

    - name: Display Xcode version
      run: xcodebuild -version

    - name: Display SDK version
      run: xcrun simctl list devices

    - name: Install CocoaPods
      run: |
        sudo gem install cocoapods -n /usr/local/bin
        pod --version

    - name: Install CocoaPods dependencies
      run: |
        if [ -f "Podfile" ]; then
          echo "Installing CocoaPods dependencies..."
          pod deintegrate || true
          pod install --repo-update --clean-install
        fi

    - name: Check for workspace or project
      run: |
        if [ -d "veivo.xcworkspace" ]; then
          echo "Using workspace: veivo.xcworkspace"
          WORKSPACE="-workspace veivo.xcworkspace"
        elif [ -f "veivo.xcodeproj" ]; then
          echo "Using project: veivo.xcodeproj"
          WORKSPACE="-project veivo.xcodeproj"
        else
          echo "Error: Neither veivo.xcworkspace nor veivo.xcodeproj found!"
          exit 1
        fi
        echo "WORKSPACE=$WORKSPACE" >> $GITHUB_ENV

    - name: Build Archive
      run: |
        xcodebuild archive \
          $WORKSPACE \
          -scheme veivo \
          -configuration Release \
          -archivePath ${{ github.workspace }}/build/veivo.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          VALID_ARCHS="arm64" \
          ONLY_ACTIVE_ARCH=NO \
          GCC_WARN_INHIBIT_ALL_WARNINGS=YES \
          CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER=NO

    - name: Verify archive was created
      run: |
        if [ -d "${{ github.workspace }}/build/veivo.xcarchive" ]; then
          echo "✅ Archive created successfully"
          ls -lh ${{ github.workspace }}/build/
        else
          echo "❌ Archive creation failed"
          exit 1
        fi

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath ${{ github.workspace }}/build/veivo.xcarchive \
          -exportPath ${{ github.workspace }}/build/export \
          -exportOptionsPlist exportOptions.plist

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: veivo-release-ipa
        path: build/export/*.ipa
        if-no-files-found: ignore

    - name: Upload dSYM
      uses: actions/upload-artifact@v4
      with:
        name: veivo-dSYM
        path: build/veivo.xcarchive/dSYMs/*.dSYM
        if-no-files-found: ignore
